
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SURAGUA - Gestión en la Nube</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Signature Pad -->
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- HTML2Canvas para capturar el reporte -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- AGREGADO: LocalForage para evitar límite de 5MB de localStorage -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    
    <style>
        :root {
            --azul-oscuro: #001f3f;
            --azul-marino: #003366;
            --celeste-brillante: #007bff;
            --blanco: #ffffff;
            --amarillo: #ffc107;
            --verde: #28a745;
            --rojo: #dc3545;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background: #001f3f; /* Fondo sólido por defecto */
            background-image: linear-gradient(rgba(0,31,63,0.8), rgba(0,31,63,0.8)), url('fondo.jpg');
            background-size: cover;
            background-attachment: fixed;
            color: var(--blanco);
            min-height: 100vh;
        }

        .container { max-width: 500px; margin: 0 auto; padding: 20px; }

        header { text-align: center; margin-bottom: 20px; }
        .logo { max-width: 180px; filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.5)); }

        #login-section {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            background: white;
            color: #333;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: var(--celeste-brillante);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:hover { opacity: 0.9; transform: scale(1.01); }
        .btn-secondary { background: var(--azul-marino); border: 1px solid rgba(255,255,255,0.3); }

        .view-section { display: none; }
        .menu-vertical { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }

        .card {
            background: white;
            color: #333;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 10px solid var(--amarillo);
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            position: relative;
        }
        .card.listo { border-left-color: var(--verde); }

        .status-light {
            width: 12px; height: 12px; border-radius: 50%;
            display: inline-block; margin-right: 10px;
        }
        .bg-yellow { background: var(--amarillo); }
        .bg-green { background: var(--verde); }

        .report-img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin: 10px 0;
            border: 2px solid #ddd;
        }

        #signature-pad {
            border: 1px solid #ccc;
            background: #f9f9f9;
            width: 100%;
            height: 160px;
            border-radius: 10px;
            touch-action: none; /* Crucial para móviles */
        }

        .info-box-tech {
            background: rgba(255,255,255,0.15);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px dashed white;
            font-size: 0.9rem;
        }

        #modal-detalle {
            position: fixed; top:0; left:0; width: 100%; height:100%;
            background: rgba(0,0,0,0.95); z-index: 1000; overflow-y: auto; padding: 20px;
            display: none;
        }
        .modal-content { background: white; color: #333; padding: 25px; border-radius: 15px; max-width: 480px; margin: auto; }

        /* --- ESTILOS PARA REPRODUCIR LA FOTO EXACTA --- */
        .captura-reporte {
            background: white !important;
            padding: 20px;
            border-radius: 20px;
            color: #333;
            width: 100%;
            max-width: 450px;
            margin: auto;
            box-sizing: border-box;
        }
        .captura-reporte h2 {
            color: #005a9c;
            text-align: center;
            font-size: 1.4rem;
            margin-bottom: 5px;
        }
        .captura-reporte hr {
            border: none;
            border-top: 1px solid #ccc;
            margin: 10px 0;
        }
        .captura-reporte p {
            margin: 4px 0;
            font-size: 0.9rem;
        }
        .captura-reporte .label {
            font-weight: bold;
        }
        .captura-reporte .firma-recuadro {
            border: 1px solid #ccc;
            width: 100%;
            height: 120px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
        }
        .captura-reporte .img-equipo-full {
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
            display: block;
        }

        /* Ocultar botones al imprimir */
        @media print {
            body * { visibility: hidden; }
            #modal-detalle, #modal-detalle *, #area-a-capturar, #modal-content-body, #modal-content-body * { visibility: visible; }
            #modal-detalle { position: absolute !important; left: 0; top: 0; width: 100%; height: auto !important; overflow: visible !important; background: white !important; }
            #modal-content-body { position: relative; width: 100%; padding: 0; }
            #botones-accion, button { display: none !important; }
            body { background: white !important; height: auto !important; }
        }

        /* Loader */
        .loader {
            display: none;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            color: var(--amarillo);
        }

        /* --- AGREGADO PARA OFFLINE --- */
        #sync-badge {
            background: var(--amarillo);
            color: #000;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            display: none;
            font-weight: bold;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="logo.png" alt="SURAGUA" class="logo">
        <div id="sync-status" style="font-size: 0.7rem; opacity: 0.7;">Sistema Integral Suragua</div>
        <div id="sync-badge">Pendiente de subir: <span id="sync-count">0</span></div>
    </header>

    <!-- LOGIN -->
    <div id="login-section">
        <h2 style="margin-bottom: 20px;">Acceso al Sistema</h2>
        <select id="user">
            <option value="admin">Oficina / Admin</option>
            <option value="servicio tecnico">Servicio Técnico</option>
        </select>
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="login()"><i class="fas fa-sign-in-alt"></i> Ingresar</button>
    </div>

    <!-- DASHBOARD ADMIN -->
    <div id="admin-view" class="view-section">
        <h3 style="text-align: center;">Panel Administración</h3>
        <div class="menu-vertical">
            <button onclick="showSection('carga-view')"><i class="fas fa-plus-circle"></i> Carga de Pedidos</button>
            <button onclick="abrirGestion()"><i class="fas fa-tasks"></i> Gestión de Pedidos</button>
            <button onclick="logout()" style="background: var(--rojo); margin-top: 20px;"><i class="fas fa-power-off"></i> Cerrar Sesión</button>
        </div>
    </div>

    <!-- DASHBOARD TÉCNICO -->
    <div id="tech-view" class="view-section">
        <h3 style="text-align: center;">Panel Servicio Técnico</h3>
        <div class="menu-vertical">
            <!-- AGREGADO: Carga de pedidos para técnico -->
            <button onclick="showSection('carga-view')"><i class="fas fa-plus-circle"></i> Carga de Pedidos</button>
            <button onclick="abrirPedidosTech()"><i class="fas fa-tools"></i> Órdenes de Trabajo</button>
            <button onclick="abrirGestion()"><i class="fas fa-search"></i> Buscar Pedidos</button>
            <button onclick="logout()" style="background: var(--rojo); margin-top: 20px;"><i class="fas fa-power-off"></i> Cerrar Sesión</button>
        </div>
    </div>

    <!-- FORMULARIO CARGA -->
    <div id="carga-view" class="view-section">
        <button onclick="backToMenu()" class="btn-secondary"><i class="fas fa-arrow-left"></i> Volver</button>
        <h2 style="margin: 15px 0;">Nuevo Pedido</h2>
        <form id="form-pedido">
            <input type="text" id="dispenser_id" placeholder="ID del Dispenser" required>
            <input type="text" id="cliente_usuario" placeholder="Usuario / Cliente" required>
            <input type="text" id="sector" placeholder="Sector">
            <input type="text" id="lugar" placeholder="Lugar Específico">
            <textarea id="desperfecto" placeholder="Desperfecto" rows="3" required></textarea>
            <textarea id="observaciones" placeholder="Observaciones del Pedido" rows="2"></textarea>
            <input type="text" id="contacto" placeholder="Contacto">
            <input type="text" id="extra" placeholder="Extra">
            <button type="button" id="btnGuardar" onclick="guardarPedido()" style="background: var(--verde);">Guardar en Nube</button>
        </form>
    </div>

    <!-- GESTIÓN / LISTADO -->
    <div id="gestion-view" class="view-section">
        <button onclick="backToMenu()" class="btn-secondary"><i class="fas fa-arrow-left"></i> Volver</button>
        <h2 style="margin: 15px 0;">Gestión de Pedidos</h2>
        <!-- MODIFICACIÓN: Contenedor de filtros -->
        <div style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px;">
            <input type="date" id="search-date" onchange="renderPedidos()" placeholder="Filtrar por fecha">
            <input type="text" id="search-machine" onkeyup="renderPedidos()" placeholder="Buscar por ID de Máquina / Dispenser">
            <!-- AGREGADO: Botón para resetear filtros -->
            <button onclick="resetearFiltros()" style="padding: 8px; font-size: 0.8rem; background: #666;"><i class="fas fa-undo"></i> Limpiar Filtros</button>
        </div>
        <div id="loader-list" class="loader">Cargando datos...</div>
        <div id="lista-pedidos" style="margin-top:15px;"></div>
    </div>

    <!-- PEDIDOS TÉCNICO -->
    <div id="pedidos-tech-view" class="view-section">
        <button onclick="backToMenu()" class="btn-secondary"><i class="fas fa-arrow-left"></i> Volver</button>
        <h2 style="margin: 15px 0;">Órdenes de Trabajo</h2>
        <div id="loader-tech" class="loader">Actualizando pedidos...</div>
        <div id="lista-pedidos-tech"></div>
    </div>

    <!-- FORMULARIO CIERRE TÉCNICO -->
    <div id="cierre-tech-view" class="view-section">
        <button onclick="showSection('pedidos-tech-view')" class="btn-secondary"><i class="fas fa-arrow-left"></i> Volver</button>
        <h2 style="margin: 15px 0;">Finalizar Trabajo</h2>
        
        <div id="info-equipo-completa" class="info-box-tech"></div>

        <textarea id="tech_obs" placeholder="Observaciones del técnico" required></textarea>
        <textarea id="tech_acciones" placeholder="Acciones realizadas" required></textarea>
        
        <label>Responsable:</label>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="tech_resp_nombre" placeholder="Nombre">
            <input type="text" id="tech_resp_apellido" placeholder="Apellido">
        </div>

        <label>Foto del Equipo (Obligatorio):</label>
        <input type="file" id="tech_foto" accept="image/*" capture="camera">
        
        <label>Firma del Responsable:</label>
        <canvas id="signature-pad"></canvas>
        <button onclick="signaturePad.clear()" class="btn-secondary" style="padding: 5px; font-size: 10px;">LIMPIAR FIRMA</button>

        <label>Estado Final:</label>
        <select id="tech_estado_final">
            <option value="AMARILLO">PENDIENTE (AMARILLO)</option>
            <option value="VERDE">MAQUINA LISTA (VERDE)</option>
        </select>
        <button id="btnFinalizar" onclick="finalizarPedido()" style="background: var(--verde); margin-bottom: 50px;">Subir Reporte</button>
    </div>
</div>

<!-- MODAL DETALLE -->
<div id="modal-detalle">
    <div id="area-a-capturar" style="background: white;">
        <div class="captura-reporte" id="modal-content-body"></div>
    </div>
    <div class="container" style="max-width: 480px; margin-top: 10px;">
        <div id="botones-accion" style="display:flex; flex-direction:column; gap:10px;">
            <button id="btnFullFoto" onclick="descargarReporteCompleto()" style="background:#f39c12;"><i class="fas fa-camera"></i> DESCARGAR REPORTE COMPLETO (FOTO)</button>
            <button id="btnWA" onclick="compartirSoloTexto('WA')" style="background:#25d366;"><i class="fab fa-whatsapp"></i> ENVIAR DATOS POR WHATSAPP</button>
            <button id="btnMail" onclick="compartirSoloTexto('MAIL')" style="background:#0078D4;"><i class="fas fa-envelope"></i> ENVIAR DATOS POR EMAIL</button>
            <button onclick="window.print()" style="background:#333;"><i class="fas fa-print"></i> IMPRIMIR REPORTE</button>
            <button onclick="cerrarModal()" style="background: var(--rojo);">CERRAR DETALLE</button>
        </div>
    </div>
</div>

<script>
    // CONFIGURACIÓN SUPABASE
    const SUPABASE_URL = 'https://bqabeuurepaezrvrvjls.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJxYWJldXVyZXBhZXpydnJ2amxzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwODM1ODIsImV4cCI6MjA5ODY1OTU4Mn0.V7IbAR36FGDwaagJ9rgfq3mKphdr6Kr1ayZtxpiCFyg'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // CONFIGURACIÓN LOCALFORAGE (INDEXEDDB)
    localforage.config({
        name: 'SuraguaSystem',
        storeName: 'offline_store'
    });

    let pedidos = [];
    let currentUser = null;
    let currentPedidoId = null;
    let currentPedidoData = null;
    let signaturePad;

    window.onload = async () => {
        const canvas = document.getElementById('signature-pad');
        signaturePad = new SignaturePad(canvas);
        signaturePad.penColor = "rgb(0, 0, 0)"; // FIRMA EN NEGRO
        
        // Carga inicial forzada desde cache para que no esté vacío al abrir
        // MODIFICADO: Usar localforage en vez de localStorage
        // const local = localStorage.getItem('cache_pedidos');
        const localData = await localforage.getItem('cache_pedidos');
        if(localData) {
            // pedidos = JSON.parse(local);
            pedidos = localData;
            console.log("Datos cargados desde IndexedDB al iniciar");
        }

        // Ajuste inicial (puede fallar si está oculto)
        resizeCanvas();

        // INICIAR SYNC OFFLINE
        actualizarContadorSync();
        setInterval(procesarColaSync, 15000); // Intenta sincronizar cada 15 seg
        window.addEventListener('online', procesarColaSync);
    };

    // --- AGREGADO: FUNCION PARA QUE LA FIRMA NO FALLE ---
    function resizeCanvas() {
        const canvas = document.getElementById('signature-pad');
        const ratio =  Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
        if(signaturePad) signaturePad.clear(); 
    }

    // NAVEGACIÓN Y LOGIN
    async function login() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;

        if (u === "admin" && p === "oficina3876") {
            currentUser = "admin";
            cargarPedidos(); // Dispara carga de fondo
            showSection('admin-view');
        } else if (u === "servicio tecnico" && p === "broncel3876") {
            currentUser = "tech";
            cargarPedidos(); // Dispara carga de fondo
            showSection('tech-view');
        } else {
            alert("Contraseña incorrecta");
        }
    }

    function logout() {
        currentUser = null;
        document.getElementById('pass').value = "";
        showSection('login-section');
    }

    function showSection(id) {
        document.querySelectorAll('.view-section, #login-section').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        window.scrollTo(0,0);
        // Si entramos al cierre tecnico, recalculamos el canvas porque ahora si es visible
        if(id === 'cierre-tech-view') { setTimeout(resizeCanvas, 100); }
    }

    function backToMenu() {
        showSection(currentUser === "admin" ? 'admin-view' : 'tech-view');
    }

    // OPERACIONES DE DATOS
    async function cargarPedidos() {
        // Primero mostrar lo que tenemos localmente para fluidez instantánea
        // MODIFICADO: Usar localforage
        // const local = localStorage.getItem('cache_pedidos');
        const localData = await localforage.getItem('cache_pedidos');
        if(localData) {
            // pedidos = JSON.parse(local);
            pedidos = localData;
            renderPedidos();
            renderPedidosTech();
        }

        try {
            // No bloqueamos la ejecución si no hay internet (usando un timeout corto o manejo de error)
            const { data, error } = await _supabase
                .from('pedidos')
                .select('*')
                .order('fecha', { ascending: false });
            
            if (!error && data) {
                pedidos = data;
                // localStorage.setItem('cache_pedidos', JSON.stringify(data));
                await localforage.setItem('cache_pedidos', data);
                renderPedidos();
                renderPedidosTech();
            }
        } catch (e) {
            console.log("Modo offline o error de red: usando cache local");
            // Aun con error, nos aseguramos que renderPedidos use lo que hay en memoria
            renderPedidos();
            renderPedidosTech();
        }
        
        return pedidos;
    }

    // MODIFICADO: Ahora limpia los inputs al abrir para que la fecha no esté activa por defecto
    async function abrirGestion() {
        document.getElementById('search-date').value = "";
        document.getElementById('search-machine').value = "";
        showSection('gestion-view');
        document.getElementById('loader-list').style.display = 'block';
        await cargarPedidos();
        document.getElementById('loader-list').style.display = 'none';
        renderPedidos();
    }

    // AGREGADO: Función para resetear filtros manualmente
    function resetearFiltros() {
        document.getElementById('search-date').value = "";
        document.getElementById('search-machine').value = "";
        renderPedidos();
    }

    async function abrirPedidosTech() {
        showSection('pedidos-tech-view');
        document.getElementById('loader-tech').style.display = 'block';
        await cargarPedidos();
        document.getElementById('loader-tech').style.display = 'none';
        renderPedidosTech();
    }

    async function guardarPedido() {
        const btn = document.getElementById('btnGuardar');
        const nuevo = {
            dispenser_id: document.getElementById('dispenser_id').value,
            cliente_usuario: document.getElementById('cliente_usuario').value,
            sector: document.getElementById('sector').value,
            lugar: document.getElementById('lugar').value,
            desperfecto: document.getElementById('desperfecto').value,
            observaciones: document.getElementById('observaciones').value,
            contacto: document.getElementById('contacto').value,
            extra: document.getElementById('extra').value,
            estado: 'AMARILLO',
            fecha: new Date().toISOString().split('T')[0]
        };

        if(!nuevo.dispenser_id || !nuevo.cliente_usuario) return alert("Faltan datos obligatorios");
        
        // --- LOGICA OFFLINE: GUARDAR EN COLA ---
        await agregarAColaSync('NUEVO_PEDIDO', nuevo);
        
        // Actualizar vista local inmediatamente
        pedidos.unshift(nuevo);
        // localStorage.setItem('cache_pedidos', JSON.stringify(pedidos));
        await localforage.setItem('cache_pedidos', pedidos);

        alert("Pedido guardado localmente. Se subirá automáticamente al detectar internet.");
        document.getElementById('form-pedido').reset();
        backToMenu();
        procesarColaSync();
    }

    function renderPedidos() {
        const container = document.getElementById('lista-pedidos');
        if(!container) return;
        
        // MODIFICACIÓN: Capturar ambos valores de búsqueda
        const filterDate = document.getElementById('search-date').value;
        const filterMachine = document.getElementById('search-machine').value.toLowerCase();
        
        container.innerHTML = "";
        
        // MODIFICACIÓN: Filtrado combinado (Fecha + ID Máquina)
        const filtered = pedidos.filter(p => {
            const matchDate = filterDate ? p.fecha === filterDate : true;
            const matchMachine = filterMachine ? (p.dispenser_id && p.dispenser_id.toString().toLowerCase().includes(filterMachine)) : true;
            return matchDate && matchMachine;
        });

        if(filtered.length === 0) {
            container.innerHTML = "<p style='text-align:center; padding:20px;'>No hay datos que coincidan con la búsqueda.</p>";
            return;
        }

        filtered.forEach((p) => {
            const card = document.createElement('div');
            card.className = `card ${p.estado === 'VERDE' ? 'listo' : ''}`;
            card.onclick = () => verDetalle(p);
            card.innerHTML = `
                <span class="status-light ${p.estado === 'VERDE' ? 'bg-green' : 'bg-yellow'}"></span>
                <strong>ID: ${p.dispenser_id}</strong> - ${p.cliente_usuario}<br>
                <small>${p.fecha} | ${p.sector || 'Sin Sector'}</small>
            `;
            container.appendChild(card);
        });
    }

    function renderPedidosTech() {
        const container = document.getElementById('lista-pedidos-tech');
        if(!container) return;
        container.innerHTML = "";
        
        const pendientes = pedidos.filter(p => p.estado === 'AMARILLO');

        if(pendientes.length === 0) {
            container.innerHTML = "<p style='text-align:center; padding:20px;'>No hay órdenes pendientes localmente.</p>";
            return;
        }

        pendientes.forEach((p) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => abrirCierreTech(p);
            card.innerHTML = `<strong>Dispenser: ${p.dispenser_id}</strong><br><small>${p.cliente_usuario} - ${p.sector}</small>`;
            container.appendChild(card);
        });
    }

    function abrirCierreTech(p) {
        currentPedidoId = p.id;
        document.getElementById('info-equipo-completa').innerHTML = `
            <p><strong>DATOS DEL PEDIDO:</strong></p>
            <p>ID Dispenser: ${p.dispenser_id}</p>
            <p>Usuario: ${p.cliente_usuario}</p>
            <p>Sector: ${p.sector || '---'}</p>
            <p>Lugar: ${p.lugar || '---'}</p>
            <p>Falla: ${p.desperfecto}</p>
            <p>Obs. Pedido: ${p.observaciones || '---'}</p>
            <p>Contacto: ${p.contacto || 'N/A'}</p>
            <p>Extra: ${p.extra || '---'}</p>
        `;
        showSection('cierre-tech-view');
        signaturePad.clear();
    }

    // --- FINALIZAR PEDIDO (VERSION FLUIDA OFFLINE) ---
    async function finalizarPedido() {
        const btn = document.getElementById('btnFinalizar');
        const obs = document.getElementById('tech_obs').value;
        const acciones = document.getElementById('tech_acciones').value;
        const nombre = document.getElementById('tech_resp_nombre').value;
        const apellido = document.getElementById('tech_resp_apellido').value;
        const fotoInput = document.getElementById('tech_foto');
        const estado = document.getElementById('tech_estado_final').value;

        if(!obs || !acciones || !nombre || fotoInput.files.length === 0 || signaturePad.isEmpty()) {
            return alert("Falta foto, firma o datos obligatorios.");
        }

        btn.disabled = true;
        btn.innerText = "PROCESANDO REPORTE...";

        try {
            // Convertir Foto a Base64 para guardado offline
            const fotoFile = fotoInput.files[0];
            const fotoBase64 = await toBase64(fotoFile);
            
            // Convertir Firma a Base64
            const firmaBase64 = signaturePad.toDataURL();

            const reporte = {
                id: currentPedidoId,
                tech_obs: obs,
                tech_acciones: acciones,
                tech_responsable: `${nombre} ${apellido}`,
                tech_foto_base64: fotoBase64, // Guardamos el contenido real
                tech_firma_base64: firmaBase64,
                estado: estado,
                foto_nombre: `${Date.now()}_img.png`,
                firma_nombre: `${Date.now()}_firma.png`
            };

            // Guardar en cola de sincronización
            await agregarAColaSync('CIERRE_TECNICO', reporte);

            // Actualizar estado localmente para que desaparezca de "Pendientes"
            pedidos = pedidos.map(p => {
                if(p.id === currentPedidoId) {
                    return {...p, estado: estado, tech_acciones: acciones, tech_obs: obs, tech_responsable: `${nombre} ${apellido}`};
                }
                return p;
            });
            // localStorage.setItem('cache_pedidos', JSON.stringify(pedidos));
            await localforage.setItem('cache_pedidos', pedidos);

            alert("Reporte guardado. Se subirá a la nube en segundo plano.");
            
            // Limpiar formulario y volver
            document.getElementById('tech_obs').value = "";
            document.getElementById('tech_acciones').value = "";
            document.getElementById('tech_foto').value = "";
            signaturePad.clear();
            
            backToMenu();
            procesarColaSync();

        } catch (err) {
            alert("Error al procesar localmente: " + err.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "SUBIR REPORTE";
        }
    }

    // UTILS
    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });

    // --- SISTEMA DE SINCRONIZACIÓN EN SEGUNDO PLANO ---
    async function agregarAColaSync(tipo, data) {
        // let cola = JSON.parse(localStorage.getItem('sync_queue') || '[]');
        let cola = await localforage.getItem('sync_queue') || [];
        cola.push({ tipo, data, timestamp: Date.now() });
        // localStorage.setItem('sync_queue', JSON.stringify(cola));
        await localforage.setItem('sync_queue', cola);
        actualizarContadorSync();
    }

    async function actualizarContadorSync() {
        // const cola = JSON.parse(localStorage.getItem('sync_queue') || '[]');
        const cola = await localforage.getItem('sync_queue') || [];
        const badge = document.getElementById('sync-badge');
        const count = document.getElementById('sync-count');
        const status = document.getElementById('sync-status');
        
        if(cola.length > 0) {
            badge.style.display = 'block';
            count.innerText = cola.length;
            status.innerText = "Sincronizando pendientes...";
        } else {
            badge.style.display = 'none';
            status.innerText = "Sincronizado con la nube";
        }
    }

    let isSyncing = false;
    async function procesarColaSync() {
        if(isSyncing || !navigator.onLine) return;
        
        // let cola = JSON.parse(localStorage.getItem('sync_queue') || '[]');
        let cola = await localforage.getItem('sync_queue') || [];
        if(cola.length === 0) return;

        isSyncing = true;
        const item = cola[0]; // Procesamos de a uno

        try {
            if(item.tipo === 'NUEVO_PEDIDO') {
                const { error } = await _supabase.from('pedidos').insert([item.data]);
                if(error) throw error;
            } 
            else if(item.tipo === 'CIERRE_TECNICO') {
                const d = item.data;
                
                // 1. Subir Foto desde Base64
                const resFoto = await fetch(d.tech_foto_base64);
                const blobFoto = await resFoto.blob();
                await _supabase.storage.from('fotos').upload(d.foto_nombre, blobFoto);
                const urlFoto = _supabase.storage.from('fotos').getPublicUrl(d.foto_nombre).data.publicUrl;

                // 2. Subir Firma desde Base64
                const resFirma = await fetch(d.tech_firma_base64);
                const blobFirma = await resFirma.blob();
                await _supabase.storage.from('fotos').upload(d.firma_nombre, blobFirma);
                const urlFirma = _supabase.storage.from('fotos').getPublicUrl(d.firma_nombre).data.publicUrl;

                // 3. Update DB
                const { error: eDB } = await _supabase.from('pedidos').update({
                    tech_obs: d.tech_obs,
                    tech_acciones: d.tech_acciones,
                    tech_responsable: d.tech_responsable,
                    tech_foto_url: urlFoto,
                    tech_firma_url: urlFirma,
                    estado: d.estado
                }).eq('id', d.id);
                
                if(eDB) throw eDB;
            }

            // Si tuvo éxito, eliminar de la cola
            cola.shift();
            // localStorage.setItem('sync_queue', JSON.stringify(cola));
            await localforage.setItem('sync_queue', cola);
            console.log("Item sincronizado con éxito");
            
        } catch (err) {
            console.error("Error en sync, reintentando luego:", err);
        } finally {
            isSyncing = false;
            actualizarContadorSync();
            // Si quedan items, seguir procesando
            if(cola.length > 0) setTimeout(procesarColaSync, 1000);
        }
    }

    async function descargarReporteCompleto() {
        const area = document.getElementById('area-a-capturar');
        const btn = document.getElementById('btnFullFoto');
        const originalText = btn.innerHTML;
        
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> GENERANDO IMAGEN...';
        btn.disabled = true;

        try {
            // Asegurar que el scroll esté arriba para capturar todo
            const modal = document.getElementById('modal-detalle');
            modal.scrollTop = 0;

            const canvas = await html2canvas(area, {
                useCORS: true,
                scale: 3, // Mayor calidad para que se vea toda la hoja
                backgroundColor: "#ffffff",
                logging: false,
                height: area.scrollHeight,
                windowHeight: area.scrollHeight
            });
            
            const dataUrl = canvas.toDataURL('image/png');
            const blob = await (await fetch(dataUrl)).blob();
            const file = new File([blob], `Reporte_SURAGUA_${currentPedidoId}.png`, { type: 'image/png' });

            if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({
                        files: [file],
                        title: 'Reporte SURAGUA Full',
                        text: `Adjunto reporte completo del dispenser ID ${currentPedidoId}.`
                    });
                } catch (shareErr) {
                    realizarDescargaDirecta(dataUrl);
                }
            } else {
                realizarDescargaDirecta(dataUrl);
            }
        } catch (e) {
            alert("Error al generar imagen: " + e.message);
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }

    function realizarDescargaDirecta(url) {
        const link = document.createElement('a');
        link.href = url;
        link.download = `Reporte_SURAGUA_${currentPedidoId}.png`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        alert("Reporte descargado como imagen en tu galería.");
    }
